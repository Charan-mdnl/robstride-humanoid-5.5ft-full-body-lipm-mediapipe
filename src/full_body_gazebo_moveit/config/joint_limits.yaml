# joint_limits.yaml
# Velocity and acceleration limits applied by MoveIt planning.
# Position limits are read from the URDF <limit> tags.

default_velocity_scaling_factor: 0.2
default_acceleration_scaling_factor: 0.2

joint_limits:
  # ── Right leg ──────────────────────────────────────────────
  hip_pitch_r:
    has_velocity_limits: true
    max_velocity: 5.0
    has_acceleration_limits: true
    max_acceleration: 10.0
  hip_roll_r:
    has_velocity_limits: true
    max_velocity: 5.0
    has_acceleration_limits: true
    max_acceleration: 10.0
  thigh_yaw_r:
    has_velocity_limits: true
    max_velocity: 5.0
    has_acceleration_limits: true
    max_acceleration: 10.0
  knee_pitch_r:
    has_velocity_limits: true
    max_velocity: 5.0
    has_acceleration_limits: true
    max_acceleration: 10.0
  ankle_pitch_r:
    has_velocity_limits: true
    max_velocity: 5.0
    has_acceleration_limits: true
    max_acceleration: 10.0
  ankle_roll_r:
    has_velocity_limits: true
    max_velocity: 5.0
    has_acceleration_limits: true
    max_acceleration: 10.0
  # ── Left leg ───────────────────────────────────────────────
  hip_pitch_l:
    has_velocity_limits: true
    max_velocity: 5.0
    has_acceleration_limits: true
    max_acceleration: 10.0
