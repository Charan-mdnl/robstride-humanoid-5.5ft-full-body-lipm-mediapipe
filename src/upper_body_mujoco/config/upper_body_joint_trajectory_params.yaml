# upper_body_joint_trajectory_params.yaml
# =========================================
# Controller-specific parameters at top level — matching H1 example pattern.
# Each controller's params are under its own top-level key.

left_controller:
  ros__parameters:
    joints:
      - shoulder_pitch_l
      - shoulder_roll_l
      - elbow_yaw_l
      - elbow_pitch_l
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: true
    action_monitor_rate: 20.0
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

right_controller:
  ros__parameters:
    joints:
      - shoulder_pitch_r
      - shoulder_roll_r
      - elbow_yaw_r
      - elbow_pitch_r
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: true
    action_monitor_rate: 20.0
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
