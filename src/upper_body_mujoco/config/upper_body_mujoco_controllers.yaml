# upper_body_mujoco_controllers.yaml
# ====================================

/**:
  ros__parameters:
    update_rate: 500  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    left_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_controller:
      type: joint_trajectory_controller/JointTrajectoryController

left_controller:
  ros__parameters:
    joints:
      - shoulder_pitch_l
      - shoulder_roll_l
      - elbow_yaw_l
      - elbow_pitch_l
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: true
    # open_loop bypasses strict timestamp checking - fixes sim_time mismatch
    open_loop_control: true
    allow_nonzero_velocity_at_trajectory_end: true
    action_monitor_rate: 20.0
    constraints:
      stopped_velocity_tolerance: 0.0
      goal_time: 0.0

right_controller:
  ros__parameters:
    joints:
      - shoulder_pitch_r
      - shoulder_roll_r
      - elbow_yaw_r
      - elbow_pitch_r
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: true
    open_loop_control: true
    allow_nonzero_velocity_at_trajectory_end: true
    action_monitor_rate: 20.0
    constraints:
      stopped_velocity_tolerance: 0.0
      goal_time: 0.0
